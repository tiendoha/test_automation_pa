name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Cấp quyền cho GitHub Actions để đẩy Report lên nhánh gh-pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 20 
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20    
        cache: 'npm'          

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test
      env:
        BASE_URL: ${{ vars.BASE_URL }}
        TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        TEST_USERNAME: ${{ secrets.TEST_USERNAME }}

    # 1. Upload Artifact mặc định của Playwright
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7

    # 2. Lấy lại lịch sử các lần test trước (để vẽ biểu đồ xu hướng)
    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    # 3. Sinh ra báo cáo Allure Report (Dashboard)
    - name: Generate Allure Report
      uses: simple-elf/allure-report-action@master
      if: always()
      id: allure-report
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20

    # 4. Deploy Dashboard lên GitHub Pages
    - name: Deploy report to Github Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history

    # 5. Hiển thị link truy cập nhanh ngay trên trang Summary của GitHub
    - name: Generate Job Summary
      if: always()
      run: |
        echo "###  Báo Cáo Allure Report Đã Sẵn Sàng" >> $GITHUB_STEP_SUMMARY
        echo " **[Bấm vào đây để xem Dashboard](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)**" >> $GITHUB_STEP_SUMMARY