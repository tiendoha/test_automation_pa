name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # ── Nightly Regression: chạy lúc 01:00 UTC mỗi ngày (08:00 ICT) ──
  schedule:
    - cron: '0 1 * * *'

# Cấp quyền cho GitHub Actions để đẩy Report lên nhánh gh-pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    name: "[${{ matrix.project }}] Playwright Tests"
    timeout-minutes: 30
    runs-on: ubuntu-latest

    strategy:
      # Tiếp tục chạy các matrix jobs khác dù một job thất bại
      fail-fast: false
      matrix:
        # ── Unauthenticated projects chạy song song (register/login/cart) ──
        # ── Authenticated :auth projects chạy song song (checkout) ──────────
        project:
          - chromium
          - firefox
          - webkit
          - chromium:auth
          - firefox:auth
          - webkit:auth

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # ── Setup project (tạo auth state) chạy trước các :auth jobs ───────────
      # Chỉ chạy setup khi cần (các :auth projects phụ thuộc vào auth.json)
      - name: Run auth setup (required for :auth projects)
        if: contains(matrix.project, ':auth')
        run: npx playwright test --project=setup
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}

      # ── Chạy test chính theo project được chọn bởi matrix ───────────────────
      - name: Run Playwright tests [${{ matrix.project }}]
        run: npx playwright test --project="${{ matrix.project }}"
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}

      # ── Upload Playwright HTML report ────────────────────────────────────────
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 7

      # ── Upload Allure results (mỗi job upload riêng để merge sau) ────────────
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-results-${{ matrix.project }}
          path: allure-results/
          retention-days: 7

  # ── Job riêng: gộp Allure results từ tất cả matrix jobs và deploy ───────────
  allure-report:
    name: "Publish Allure Report"
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - uses: actions/checkout@v4

      # Tải kết quả từ tất cả các matrix jobs về một thư mục chung
      - name: Download all Allure Results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results-combined
          merge-multiple: true

      # Lấy lại lịch sử các lần test trước (để vẽ biểu đồ xu hướng)
      - name: Get Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      # Sinh ra báo cáo Allure Report tổng hợp
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        id: allure-report
        with:
          allure_results: allure-results-combined
          allure_history: allure-history
          keep_reports: 20

      # Deploy Dashboard lên GitHub Pages
      - name: Deploy report to Github Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      # Hiển thị link truy cập nhanh ngay trên trang Summary của GitHub
      - name: Generate Job Summary
        run: |
          echo "### Allure Report Đã Sẵn Sàng" >> $GITHUB_STEP_SUMMARY
          echo "**[Bấm vào đây để xem Dashboard](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Browser Project | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| chromium |" >> $GITHUB_STEP_SUMMARY
          echo "| firefox |" >> $GITHUB_STEP_SUMMARY
          echo "| webkit |" >> $GITHUB_STEP_SUMMARY
          echo "| chromium:auth |" >> $GITHUB_STEP_SUMMARY
          echo "| firefox:auth |" >> $GITHUB_STEP_SUMMARY
          echo "| webkit:auth |" >> $GITHUB_STEP_SUMMARY