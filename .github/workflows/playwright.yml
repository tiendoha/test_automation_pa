name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # ── Nightly Regression: chạy lúc 01:00 UTC mỗi ngày (08:00 ICT) ──
  schedule:
    - cron: '0 1 * * *'

# Cấp quyền cho GitHub Actions để đẩy Report lên nhánh gh-pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    name: "[${{ matrix.project }}] Playwright Tests"
    timeout-minutes: 30
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project:
          - chromium
          - firefox
          - webkit
          - chromium:auth
          - firefox:auth
          - webkit:auth

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # ── Setup project (tạo auth state) chạy trước các :auth jobs ───────────
      - name: Run auth setup (required for :auth projects)
        if: contains(matrix.project, ':auth')
        run: npx playwright test --project=setup
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}

      # ── Chạy test chính theo project được chọn bởi matrix ───────────────────
      - name: Run Playwright tests [${{ matrix.project }}]
        run: npx playwright test --project="${{ matrix.project }}"
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}

      # ── Xử lý tên Artifact để tránh lỗi ký tự đặc biệt (dấu hai chấm) ──────
      - name: Sanitize Artifact Name
        if: always() # Chạy kể cả khi test fail để các bước sau lấy được SAFE_NAME
        run: |
          SAFE_NAME="${{ matrix.project }}"
          SAFE_NAME="${SAFE_NAME//:/-}"
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV

      # ── LƯU TRẠNG THÁI JOB (PASS/FAIL) ĐỂ VẼ BẢNG SUMMARY TẠI JOB SAU ──────
      - name: Save Job Status
        if: always()
        run: echo "${{ job.status }}" > status-${{ env.SAFE_NAME }}.txt

      - name: Upload Job Status
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: job-status-${{ env.SAFE_NAME }}
          path: status-${{ env.SAFE_NAME }}.txt
          retention-days: 1

      # ── Upload Playwright HTML report ────────────────────────────────────────
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ env.SAFE_NAME }}
          path: playwright-report/
          retention-days: 7

      # ── Upload Allure results (mỗi job upload riêng để merge sau) ────────────
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ env.SAFE_NAME }}
          path: allure-results/
          retention-days: 7

  # ── Job riêng: gộp Allure results từ tất cả matrix jobs và deploy ───────────
  allure-report:
    name: "Publish Allure Report"
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - uses: actions/checkout@v4

      # Tải kết quả từ tất cả các matrix jobs
      - name: Download all Allure Results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results-combined
          merge-multiple: true

      # Tải tất cả các file trạng thái (Pass/Fail) của matrix
      - name: Download all Job Statuses
        uses: actions/download-artifact@v4
        with:
          pattern: job-status-*
          path: job-statuses
          merge-multiple: true

      - name: Get Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        id: allure-report
        with:
          allure_results: allure-results-combined
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy report to Github Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      # ── KIỂM TRA TRẠNG THÁI & HIỂN THỊ BẢNG ĐỘNG ──────────────────────────────
      - name: Generate Job Summary
        run: |
          echo "### 📊 Báo Cáo Tự Động (Allure Report)" >> $GITHUB_STEP_SUMMARY
          echo "**[👉 BẤM VÀO ĐÂY ĐỂ XEM DASHBOARD CHI TIẾT](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Trình duyệt / Môi trường | 🚥 Trạng thái |" >> $GITHUB_STEP_SUMMARY
          echo "|:---|:---:|" >> $GITHUB_STEP_SUMMARY

          # Danh sách các project (safe_name)
          PROJECTS=("chromium" "firefox" "webkit" "chromium-auth" "firefox-auth" "webkit-auth")

          for PROJ in "${PROJECTS[@]}"; do
            DISPLAY_NAME="${PROJ//-/:}" # Khôi phục dấu ':' để hiển thị cho đẹp
            
            STATUS="N/A ⚠️"
            if [ -f "job-statuses/status-$PROJ.txt" ]; then
              RAW_STATUS=$(cat "job-statuses/status-$PROJ.txt")
              if [ "$RAW_STATUS" == "success" ]; then
                STATUS="**Pass** ✅"
              elif [ "$RAW_STATUS" == "failure" ]; then
                STATUS="**Fail** ❌"
              elif [ "$RAW_STATUS" == "cancelled" ]; then
                STATUS="**Cancelled** ⛔"
              fi
            fi
            echo "| **$DISPLAY_NAME** | $STATUS |" >> $GITHUB_STEP_SUMMARY
          done